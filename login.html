<section id="login" class="form-section">
        <div class="form-container reveal">
            <h2>Traveler Login</h2>
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="logUser" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="password" id="logPass" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-form">Login</button>
            </form>
        </div>
    </section>
